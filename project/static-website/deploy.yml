apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-website
spec:
  replicas: 2
  # Increased strategy surge to ensure a smoother rollout
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: my-static-website
  template:
    metadata:
      labels:
        app: my-static-website
    spec:
      containers:
      - name: static-website-container
        # Placeholder BUILD_TAG will be replaced by your pipeline (e.g., version 10)
        image: 497339096730.dkr.ecr.us-east-1.amazonaws.com/static-website:BUILD_TAG
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
      imagePullSecrets:
      - name: ecr-registry-helper
---
apiVersion: v1
kind: Service
metadata:
  name: static-website-service
spec:
  type: NodePort
  selector:
    app: my-static-website
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30008  # Standard NodePort range is 30000-32767
