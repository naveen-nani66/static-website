apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-static-website
  template:
    metadata:
      labels:
        app: my-static-website
    spec:
      containers:
      - name: static-website-container
        # Replace 'latest' with your actual build number if needed
        image: 497339096730.dkr.ecr.us-east-1.amazonaws.com/static-website:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
      imagePullSecrets:
      - name: ecr-registry-helper
---
apiVersion: v1
kind: Service
metadata:
  name: static-website-service
spec:
  type: NodePort
  selector:
    app: my-static-website
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
